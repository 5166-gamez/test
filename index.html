<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home</title>
  <link rel="shortcut icon" type="image/x-icon" href="icons/classroomicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="main-header">
  <nav>

  <div class="nav-left">
    <div id="page-indicator">
      <img id="page-icon" src="icons/pageicons/home.png" alt="Page Icon">
      <span id="page-name">Home</span>
    </div>
  </div>

  <div class="nav-center">
    <button onclick="loadSection('home')">Home</button>
    <button onclick="loadSection('games')">Games</button>
    <button onclick="loadSection('changelogs')">Changelogs</button>
    <button onclick="loadSection('contact')">Contact</button>
  </div>

  <div class="nav-right">

    <div class="settings-container">
  <button id="settings-button">
    <img src="icons/settingswhite.png" alt="Settings">
  </button>
</div>
  <button id="github-button" alt="View on GitHub">
    <img src="icons/githubwhite.png" alt="GitHub">
  </button>
</div>
</nav>
</header>
  <button id="toggle-header-btn" onclick="toggleHeader()">
    <img id="arrow-icon" src="icons/collapsewhite.png" alt="Collapse">
  </button>

<main id="content"></main>

<div id="settings-overlay">
  <div id="settings-panel">
    <div id="settings-header">
      <h2 id="settings-title">Settings</h2>
      <button id="settings-close">X</button>
    </div>
    <div id="settings-body">
      <div id="settings-categories">
      </div>
      <div id="settings-options">
      </div>
    </div>
  </div>
</div>

<main id="content"></main>
<script src="script.js"></script>
</body>
</html>
